<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งปัญหา</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.all.min.js"></script>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        html,
        body {
            background-image: linear-gradient(rgb(0, 132, 255), rgb(126, 161, 201), rgb(174, 174, 175));
            background-attachment: fixed;
        }

        * {
            /* white-space: nowrap; */
            overflow-y: auto;
            -ms-overflow-style: none;
            /* for Internet Explorer, Edge */
            scrollbar-width: none;
            /* for Firefox */
        }

        *::-webkit-scrollbar {
            display: none;
            /* for Chrome, Safari and Opera */
        }
    </style>
</head>

<body>

    <div class="container my-3">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">รับแจ้งปัญหา</h5>
                <p class="card-text g-3">
                <div class="mb-3">
                    <label for="detail" class="form-label">รายละเอียดปัญหา</label>
                    <textarea class="form-control" id="detail" rows="5"></textarea>
                </div>
                <div class="text-center">
                    <label class="form-label" style="width: 100%;">
                        <img id="preview" src="asset/null.jpeg"
                            style="width: 300px; height: 300px; object-fit: cover; border: 1px solid #ccc; border-radius: 10px; margin-bottom: 5px;" />
                        <input id="file" type="file" accept="image/*" onchange="chimg(this.files)" style="display: none;" />
                    </label>
                </div>
                <div class="d-flex justify-content-center">
                    <div class="mx-2">
                        <label class="btn btn-light btn-sm">
                            📂 เลือกภาพ
                            <input id="fileopen" type="file" accept="image/*" onchange="chimg(this.files)" style="display: none;" />
                        </label>
                    </div>

                    <div class="mx-2">
                        <label class="btn btn-light btn-sm">
                            📸 เปิดกล้อง
                            <input id="camopen" type="file" accept="image/*" capture="environment" onchange="chimg(this.files)" style="display: none;" />
                        </label>
                    </div>
                </div>
                <hr />
                <div class="text-center">
                    <a id="btn1" class="btn btn-info" style="width: 100%; display: none;"
                        onclick="sendrequest()">แจ้งปัญหา</a>
                    <a id="btn2" class="btn btn-info disabled" type="button" disabled
                        style="width: 100%; display: inline-block;">
                        <span role="status">Loading...</span>
                        <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
                    </a>
                </div>
                </p>
            </div>
        </div>
    </div>

    <script>
        var apiURL = "https://script.google.com/macros/s/AKfycbyzkjCZ9CnjTG3Yc8QS_v27l_L1r5xGlr3V97f7-nhQxA2mjHSkpYI9j0pBkwbfLBhclA/exec";
        var rawLog = '';
        var userId = 'A001';
        var pictureUrl = 'https://lh3.googleusercontent.com/d/1m3zSDqJXWIcLhmzDwz-s1nJfVR5RsSHZ';
        var displayName = 'Anonymous';

        const preview = document.getElementById('preview');

        function chimg(files) {
            let file = files[0];
            const reader1 = new FileReader();
            const reader2 = new FileReader();

            reader2.onloadend = async () => {
                rawLog = reader2.result.split(',')[1];
            };

            reader1.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // ตั้งค่าขนาด 400x400
                    const size = 400;
                    canvas.width = size;
                    canvas.height = size;

                    // คำนวณเพื่อตัดส่วนตรงกลาง (Square Crop)
                    let sX, sY, sSize;
                    if (img.width > img.height) {
                        sSize = img.height;
                        sX = (img.width - img.height) / 2;
                        sY = 0;
                    } else {
                        sSize = img.width;
                        sX = 0;
                        sY = (img.height - img.width) / 2;
                    }

                    // วาดภาพลง Canvas
                    ctx.drawImage(img, sX, sY, sSize, sSize, 0, 0, size, size);

                    // แสดงผลในแท็ก <img>
                    preview.src = canvas.toDataURL('image/jpeg', 0.8);

                    // เก็บ Blob ไว้สำหรับอัปโหลด
                    canvas.toBlob((blob) => {
                        reader2.readAsDataURL(blob);
                    }, 'image/jpeg', 0.8);
                };
            }

            if (file) {
                reader1.readAsDataURL(file);
            }
        }

        function sendMsg(msg) {
            liff.sendMessages([
                {
                    type: "text",
                    text: msg,
                },
            ])
                .then(() => {
                    console.log("message sent");
                    liff.closeWindow();
                })
                .catch((err) => {
                    console.log("error", err);
                    liff.closeWindow();
                });
        }

        async function sendrequest() {
            let url = apiURL + '?fn=sendrequest';
            let detail = document.getElementById('detail').value;

            if (detail === '' || detail === null) {
                Swal.fire({
                    title: "Failed",
                    text: "กรุณากรอกเรื่องที่ต้องการแจ้งปัญหา!",
                    icon: "error"
                }).then(() => {
                    document.getElementById('detail').focus();
                });
            } else {
                document.getElementById('btn1').style.display = 'none';
                document.getElementById('btn2').style.display = 'inline-block';

                let raw = {
                    "userId": userId,
                    "displayName": displayName,
                    "pictureUrl": pictureUrl,
                    "detail": detail,
                    "rawLog": rawLog
                };

                const requestOptions = {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(raw)
                }

                try {
                    const response = await fetch(url, requestOptions);
                    const result = await response.json();

                    if (result.res) {
                        Swal.fire({
                            title: "Success",
                            text: "บันทึกข้อมูลการแจ้งปัญหาเสร็จสิ้น",
                            icon: "success"
                        }).then((selected) => {
                            document.getElementById('detail').value = '';
                            preview.src = 'asset/null.jpeg';
                            rawLog = '';
                            document.getElementById('btn1').style.display = 'inline-block';
                            document.getElementById('btn2').style.display = 'none';
                            sendMsg(result.data);
                        });
                    } else {
                        console.log(result.data);
                        Swal.fire({
                            title: "Failed",
                            text: "บันทึกข้อมูลผิดพลาด!",
                            icon: "error"
                        }).then(() => {
                            document.getElementById('btn1').style.display = 'inline-block';
                            document.getElementById('btn2').style.display = 'none';
                        });
                    }
                } catch (e) {
                    console.error(e);
                    Swal.fire({
                        title: "Failed",
                        text: "บันทึกข้อมูลผิดพลาด!",
                        icon: "error"
                    }).then(() => {
                        document.getElementById('btn1').style.display = 'inline-block';
                        document.getElementById('btn2').style.display = 'none';
                    });
                }
            }
        }

        function setLineUser() {
            liff.getProfile()
                .then((profile) => {
                    userId = profile.userId;
                    pictureUrl = profile.pictureUrl;
                    displayName = profile.displayName;
                })
                .catch((err) => {
                    console.log("error", err);
                    Swal.fire({
                        title: "Failed",
                        text: "การเชื่อมต่อผิดพลาด!",
                        icon: "error"
                    });
                });
        }

        liff.init({ liffId: "1660727236-vNdxF5OK" }, () => {
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                setLineUser();
            }
            document.getElementById('btn1').style.display = 'inline-block';
            document.getElementById('btn2').style.display = 'none';
        }, (err) => {
            Swal.fire({
                title: "Failed",
                text: "การเชื่อมต่อผิดพลาด!",
                icon: "error"
            }).then(() => {
                document.getElementById('btn1').style.display = 'inline-block';
                document.getElementById('btn2').style.display = 'none';
            });
            console.log(err.code, err.message);
        });
    </script>
</body>

</html>
